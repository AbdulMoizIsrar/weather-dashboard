<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Starfield canvas -->
  <canvas id="starfield"></canvas>

  <div class="app-wrapper">

    <header>
      <div class="logo-row">
        <span class="logo-icon">🌤</span>
        <h1>Weather Dashboard</h1>
      </div>
      <p class="subtitle">Real-time global weather &amp; 5-day forecast</p>
    </header>

    <section class="search-section">
      <div class="search-bar">
        <input
          type="text"
          id="city-input"
          placeholder="Search for a city…"
          autocomplete="off"
          aria-label="City name"
        />
        <button id="search-btn" aria-label="Search weather">Search</button>
      </div>
    </section>

    <!-- Error banner -->
    <div id="error-msg" role="alert">
      <span>⚠️</span>
      <span id="error-text">City not found. Please try again.</span>
    </div>

    <!-- Recent searches -->
    <section class="history-section" id="history-section" style="display:none;">
      <div class="history-header">
        <span class="history-label">Recent searches</span>
        <button id="clear-history-btn">✕ Clear History</button>
      </div>
      <ul id="history-list" aria-label="Search history"></ul>
    </section>

    <!-- Loading spinner -->
    <div id="loader" role="status" aria-live="polite">
      <div class="spinner"></div>
      <p>Fetching weather data…</p>
    </div>

    <!-- Current weather -->
    <section id="current-weather" aria-live="polite">
      <div class="current-card">
        <div class="current-top">

          <div class="current-left">
            <div class="city-name"    id="cw-city"></div>
            <div class="weather-date" id="cw-date"></div>
            <div class="weather-desc" id="cw-desc"></div>
          </div>

          <div class="current-right">
            <img id="cw-icon" src="" alt="Weather icon"/>
            <span class="temp-big"  id="cw-temp"></span>
            <span class="temp-unit">°C</span>
          </div>

        </div>

        <!-- Stats grid -->
        <div class="current-stats">

          <div class="stat-chip">
            <span class="stat-icon">💧</span>
            <div class="stat-info">
              <div class="stat-label">Humidity</div>
              <div class="stat-value" id="cw-humidity">—</div>
            </div>
          </div>

          <div class="stat-chip">
            <span class="stat-icon">🌬️</span>
            <div class="stat-info">
              <div class="stat-label">Wind Speed</div>
              <div class="stat-value" id="cw-wind">—</div>
            </div>
          </div>

          <div class="stat-chip">
            <span class="stat-icon">🌡️</span>
            <div class="stat-info">
              <div class="stat-label">Feels Like</div>
              <div class="stat-value" id="cw-feels">—</div>
            </div>
          </div>

          <div class="stat-chip">
            <span class="stat-icon">👁️</span>
            <div class="stat-info">
              <div class="stat-label">Visibility</div>
              <div class="stat-value" id="cw-visibility">—</div>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- 5-day forecast -->
    <section id="forecast-section">
      <p class="section-title">5-Day Forecast</p>
      <div id="forecast-cards"></div>
    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
